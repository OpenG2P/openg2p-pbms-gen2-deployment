      destination: '{{ .Release.Name }}-bene-portal-api'
      destinationPort: '{{ .Values.benePortalApi.service.port }}'
      prefix: '{{ .Values.benePortalApi.openapiRootPath }}'
      rewriteUri: "/"
    gateway:
      enabled: false
      host: '{{ tpl .Values.benePortalApi.hostname $ }}'
      ingressController:
        istio: ingressgateway
      httpTlsRedirect: false
      httpEnabled: true
      httpsEnabled: false
      tls:
        mode: SIMPLE
        credentialName: ""

  containerPort: 8000

  service:
    type: ClusterIP
    port: 80
    nodePorts:
      http: ""
      https: ""
    externalTrafficPolicy: Cluster

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  postgresCheckerInit:
    enabled: true
    image:
      repository: jbergknoff/postgresql-client
      tag: latest
      pullPolicy: IfNotPresent
    command:
    - 'sh'
    - '-c'
    - 'until pg_isready -U ${PBMS_BENE_PORTAL_API_DB_USERNAME_BG_TASK} -h ${PBMS_BENE_PORTAL_API_DB_HOSTNAME_BG_TASK} -p ${PBMS_BENE_PORTAL_API_DB_PORT_BG_TASK:-5432} -d ${PBMS_BENE_PORTAL_API_DB_DBNAME_BG_TASK:-pbms-bg-task-db}; do sleep 3; done'

selfServiceIngress:
  enabled: false

istio:
  enabled: true
  virtualservice:
    enabled: true
    host: ""
    gateway: "internal"
    destination: '{{ include "common.names.fullname" .Subcharts.odoo }}'
    destinationPort: '{{ .Values.odoo.service.port }}'
    prefix: /
    rewriteUri: ""
  gateway:
    enabled: false
    host: ""
    ingressController:
      istio: ingressgateway
    httpTlsRedirect: true
    httpEnabled: true
    httpsEnabled: false
    tls:
      mode: SIMPLE
      credentialName: ""
