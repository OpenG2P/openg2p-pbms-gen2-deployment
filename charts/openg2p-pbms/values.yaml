    STAFF_PORTAL_API_DB_HOSTNAME: '{{ tpl .Values.global.postgresqlHost $ }}'
    STAFF_PORTAL_API_DB_PORT: 5432
    STAFF_PORTAL_API_DB_DBNAME: '{{ tpl .Values.global.pbmsBgTaskDB $ }}'
    STAFF_PORTAL_API_DB_USERNAME: '{{ tpl .Values.global.pbmsBgTaskDBUser $ }}'

  envVarsFrom:
    STAFF_PORTAL_API_DB_PASSWORD:
      secretKeyRef:
        name: '{{ tpl .Values.global.pbmsBgTaskDBSecret $ }}'
        key:  '{{ tpl .Values.global.pbmsBgTaskDBUserPasswordKey $ }}'
    STAFF_PORTAL_API_DB_PASSWORD_SR:
      secretKeyRef:
        name: '{{ tpl .Values.global.registryDBSecret $ }}'
        key: '{{ tpl .Values.global.registryDBUserPasswordKey $ }}'

  resources: {}

  startupProbe:
    enabled: true
    httpGet:
      path: /ping
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
    successThreshold: 1

  livenessProbe:
    enabled: true
    httpGet:
      path: /ping
      port: http
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

  readinessProbe:
    enabled: true
    httpGet:
      path: /ping
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

  sidecars: []

  openapiRootPath: "/"

  istio:
    enabled: true
    virtualservice:
      enabled: true
      host: '{{ tpl .Values.staffPortalApi.hostname $ }}'
      gateway: "internal"
      destination: '{{ .Release.Name }}-staff-portal-api'
      destinationPort: '{{ .Values.staffPortalApi.service.port }}'
      prefix: '{{ .Values.staffPortalApi.openapiRootPath }}'
      rewriteUri: "/"
    gateway:
      enabled: false
      host: '{{ tpl .Values.staffPortalApi.hostname $ }}'
      ingressController:
        istio: ingressgateway
      httpTlsRedirect: false
      httpEnabled: true
      httpsEnabled: false
      tls:
        mode: SIMPLE
        credentialName: ""

  containerPort: 8000

  service:
    type: ClusterIP
    port: 80
    nodePorts:
      http: ""
      https: ""
    externalTrafficPolicy: Cluster

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  postgresCheckerInit:
    enabled: true
    image:
      repository: jbergknoff/postgresql-client
      tag: latest
      pullPolicy: IfNotPresent
    command:
    - 'sh'
    - '-c'
    - 'until pg_isready -U ${STAFF_PORTAL_API_DB_USERNAME} -h ${STAFF_PORTAL_API_DB_HOSTNAME} -p ${STAFF_PORTAL_API_DB_PORT:-5432} -d ${STAFF_PORTAL_API_DB_DBNAME:-pbms-bg-task-db}; do sleep 3; done'

