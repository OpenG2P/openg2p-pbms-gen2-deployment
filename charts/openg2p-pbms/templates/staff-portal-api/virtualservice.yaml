{{- with .Values.staffPortalApi }}
{{- if and .enabled .istio.enabled .istio.virtualservice.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ template "common.names.fullname" $ }}-staff-portal-api
  labels: {{- include "common.labels.standard" (dict "customLabels" .commonLabels "context" $) | nindent 4 }}
  {{- if .commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  hosts:
  - {{ default ( include "common.tplvalues.render" (dict "value" $.Values.global.g2pPbmsBgTaskHostname "context" $ )) .istio.virtualservice.host | quote }}
  gateways:
  - {{ default (include "common.names.fullname" $) .istio.virtualservice.gateway }}
  http:
  - headers:
      request:
        set:
          x-forwarded-host: {{ default (include "common.tplvalues.render" (dict "value" $.Values.global.g2pPbmsBgTaskHostname "context" $)) $.Values.global.g2pPbmsBgTaskHostname .istio.virtualservice.host | quote }}
          x-forwarded-proto: https
    match:
    - uri:
        prefix: {{ include "common.tplvalues.render" (dict "value" .istio.virtualservice.prefix "context" $) }}
    {{- if .istio.virtualservice.rewriteUri }}
    rewrite:
      uri: {{ include "common.tplvalues.render" (dict "value" .istio.virtualservice.rewriteUri "context" $) }}
    {{- end }}
    route:
    - destination:
        host: {{ template "common.names.fullname" $ }}-staff-portal-api
        port:
          number: {{ .service.port }}
{{- end }}
{{- end }}
