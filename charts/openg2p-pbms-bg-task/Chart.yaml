apiVersion: v2
name: openg2p-pbms-bg-task
description: A Helm chart for OpenG2P G2P PBMS Background Task
type: application
version: 3.0.0
dependencies:
- name: postgresql
  repository: oci://registry-1.docker.io/bitnamicharts
  version: 15.x.x
  condition: postgresql.enabled
- name: redis
  repository: oci://registry-1.docker.io/bitnamicharts
  version: 19.x.x
  condition: redis.enabled
- name: artifactory
  version: 12.0.2
  repository: https://openg2p.github.io/openg2p-helm
  condition: artifactory.enabled
- name: keymanager
  version: 12.1.0
  repository: https://openg2p.github.io/openg2p-helm
  condition: keymanager.enabled
- name: softhsm
  repository: https://mosip.github.io/mosip-helm
  version: 12.0.1
  condition: softhsm.enabled
- name: openg2p-pbms-bg-task-api
  version: 3.0.0
  condition: openg2p-pbms-bg-task-api.enabled
- name: openg2p-pbms-bg-task-celery-beat-producers
  version: 3.0.0
  condition: openg2p-pbms-bg-task-celery-beat-producers.enabled
- name: openg2p-pbms-bg-task-celery-workers
  version: 3.0.0
  condition: openg2p-pbms-bg-task-celery-workers.enabled
keywords:
  - openg2p-pbms-bg-task
  - openg2p-pbms-bg-task-api
  - openg2p-pbms-bg-task-celery-beat-producers
  - openg2p-pbms-bg-task-celery-workers
  - g2p-pbms-bg-task
maintainers:
  - email: info@openg2p.org
    name: OpenG2P
icon: https://openg2p.github.io/openg2p-helm/openg2p-logo.png
annotations:
  catalog.cattle.io/display-name: "OpenG2P G2P PBMS Background Task"
