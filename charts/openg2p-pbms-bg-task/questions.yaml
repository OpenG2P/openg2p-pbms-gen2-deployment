questions:
- variable: global.g2pPbmsBgTaskHostname
  description: Hostname under which all PBMS Background Task services will be accessed.
  type: string
  label: PBMS Background Task Hostname
  group: General Settings

- variable: openg2p-pbms-bg-task-api.enabled
  description: Enable the PBMS Background Task API service.
  type: boolean
  label: Enable PBMS Background Task API
  group: General Settings

- variable: openg2p-pbms-bg-task-celery-beat-producers.enabled
  description: Enable the PBMS Background Task Celery Beat Producers.
  type: boolean
  label: Enable Celery Beat Producers
  group: General Settings

- variable: openg2p-pbms-bg-task-celery-workers.enabled
  description: Enable the PBMS Background Task Celery Workers.
  type: boolean
  label: Enable Celery Workers
  group: General Settings

- variable: postgresql.enabled
  description: Enable internal PostgreSQL for PBMS Background Task.
  type: boolean
  label: Use internal PostgreSQL
  group: Database Settings

- variable: postgresql.auth.username
  description: PostgreSQL username for PBMS Background Task.
  type: string
  label: PostgreSQL Username
  group: Database Settings
  show_if: "postgresql.enabled=true"

- variable: postgresql.auth.database
  description: PostgreSQL database name for PBMS Background Task.
  type: string
  label: PostgreSQL Database Name
  group: Database Settings
  show_if: "postgresql.enabled=true"

- variable: redis.enabled
  description: Enable Redis for PBMS Background Task.
  type: boolean
  label: Enable Redis
  group: Redis Settings

- variable: redis.architecture
  description: Redis deployment architecture (standalone/replication).
  type: enum
  options:
    - standalone
    - replication
  label: Redis Architecture
  group: Redis Settings
  show_if: "redis.enabled=true"

- variable: redis.master.persistence.enabled
  description: Enable persistence for Redis master.
  type: boolean
  label: Enable Redis Persistence
  group: Redis Settings
  show_if: "redis.enabled=true"

- variable: redis.auth.enabled
  description: Enable password authentication for Redis.
  type: boolean
  label: Enable Redis Auth
  group: Redis Settings
  show_if: "redis.enabled=true"

# Keymanager Section
- variable: keymanager.enabled
  description: Install Keymanager for managing keys for encryption and signatures.
  type: boolean
  label: Install Keymanager
  group: Keymanager Settings

- variable: global.keymanagerAuthEnabled
  label: Enable Keymanager API Authentication
  description: Enables Keymanager API Authentication.
  type: boolean
  show_if: "keymanager.enabled=true"
  group: Keymanager Settings

- variable: global.keymanagerBaseUrl
  label: Keymananger API Base Url
  description: Base url for accessing keymanager API.
  type: string
  show_if: "keymanager.enabled=true"
  group: Keymanager Settings

- variable: keymanager.hostname
  label: Keymanager Hostname
  description: Hostname for Keymanager service.
  type: string
  group: Keymanager Settings
  show_if: "keymanager.enabled=true"

- variable: keymanager.istio.enabled
  label: Expose Keymanager APIs
  description: >-
    Enable this to manually download/upload certificates to Keymanager.
    This exposes Keymanager APIs publicly outside Kubernetes.
  type: boolean
  group: Keymanager Settings
  show_if: "keymanager.enabled=true"

- variable: keymanager.keystoreType
  label: Keystore Type
  description: PKCS11 for HSM. PKCS12 for storing into local p12 file.
  type: enum
  options:
    - PKCS11
    - PKCS12
  group: Keymanager Settings
  show_if: "keymanager.enabled=true"

- variable: keymanager.persistence.enabled
  label: Enable Persistence
  description: Enable this if Keystore Type is PKCS12.
  type: boolean
  show_if: "keymanager.enabled=true"
  group: Keymanager Settings

- variable: keymanager.springConfig.profile
  type: string
  label: Spring Config Profile
  group: Keymanager Settings
  show_if: "keymanager.enabled=true"

- variable: keymanager.springConfig.names
  type: string
  label: Spring Config Names
  group: Keymanager Settings
  show_if: "keymanager.enabled=true"

- variable: keymanager.springConfig.gitRepo.enabled
  description: Enable download of configs from Git repo.
  type: boolean
  label: Enable Spring Config Git
  group: Keymanager Settings
  show_if: "keymanager.enabled=true"
  show_subquestion_if: true
  subquestions:
    - variable: keymanager.springConfig.gitRepo.repoUrl
      description: |-
        Repo URL for remote Git repo containing configs.
        This URL should include username/password if required.
      type: string
      label: Spring Config Git Repo URL
      group: Keymanager Settings

    - variable: keymanager.springConfig.gitRepo.branch
      description: Branch of remote Git repo containing configs.
      type: string
      label: Spring Config Git Repo Branch
      group: Keymanager Settings

- variable: keymanager.springConfig.rawConfig
  description: |-
    If git-based config is disabled, the complete application.properties can be
    directly supplied here.
  type: multiline
  label: Spring Config application properties
  group: Keymanager Settings
  show_if: "keymanager.enabled=true&&keymanager.springConfig.gitRepo.enabled=false"

- variable: keymanager.envVars.auth_server_admin_allowed_audience
  description: |-
    List of Keycloak Client IDs allowed to call this keymanager's APIs.
    Do not edit this parameter unless required.
  type: string
  label: Allowed Keycloak Client IDs
  group: Keymanager Settings
  show_if: "keymanager.enabled=true&&global.keymanagerAuthEnabled=true"

- variable: artifactory.enabled
  description: Enable Artifactory server for storing artifacts.
  type: boolean
  label: Enable Artifactory
  group: Artifactory Settings

- variable: softhsm.enabled
  description: Enable SoftHSM for HSM emulation.
  type: boolean
  label: Enable SoftHSM
  group: HSM Settings

- variable: softhsm.securityPIN
  description: Security PIN for SoftHSM (base64 encoded).
  type: string
  label: SoftHSM Security PIN
  group: HSM Settings
  show_if: "softhsm.enabled=true"
